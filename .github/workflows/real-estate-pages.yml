name: Deploy real estate app to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "data/**"
      - "build_app.py"
      - ".github/workflows/real-estate-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: real-estate-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build static app
        run: python3 build_app.py
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
