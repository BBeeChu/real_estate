<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>부동산 HTML 독립 실행 앱</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #d7dee8;
      --accent: #1f6feb;
      --accent-soft: #e8f1ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    header {
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 20px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    h1 { margin: 0; font-size: 21px; }
    .subtle { color: var(--muted); font-size: 13px; }
    .layout {
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      height: calc(100vh - 68px);
    }
    nav {
      background: #fbfcfe;
      border-right: 1px solid var(--line);
      padding: 14px;
      overflow: auto;
    }
    .search {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      font: inherit;
      margin-bottom: 12px;
      background: white;
    }
    .category {
      margin: 17px 0 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .page-btn {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 10px 11px;
      margin-bottom: 5px;
      background: transparent;
      text-align: left;
      cursor: pointer;
      color: var(--text);
    }
    .page-btn:hover { background: #edf2f7; }
    .page-btn.active {
      background: var(--accent-soft);
      border-color: #b8d4ff;
      color: #0b4fb3;
      font-weight: 800;
    }
    .source {
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
    }
    main {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      min-width: 0;
    }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--line);
    }
    .toolbar-title {
      min-width: 0;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .actions { display: flex; gap: 8px; flex: 0 0 auto; }
    .btn {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-weight: 700;
      text-decoration: none;
      font-size: 14px;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
    }
    .empty {
      padding: 18px;
      color: var(--muted);
    }
    @media (max-width: 820px) {
      header { height: auto; align-items: flex-start; flex-direction: column; }
      .layout { display: block; height: auto; }
      nav { border-right: 0; border-bottom: 1px solid var(--line); max-height: 280px; }
      main { height: calc(100vh - 280px); min-height: 620px; }
      .toolbar { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>부동산 HTML 독립 실행 앱</h1>
      <div class="subtle">원본 HTML을 각각 독립 iframe으로 실행합니다. 각 페이지 하단에서 내 문구를 따로 추가할 수 있습니다.</div>
    </div>
    <div class="subtle">GitHub Pages 배포용 정적 앱</div>
  </header>
  <div class="layout">
    <nav>
      <input id="search" class="search" placeholder="HTML 이름 검색">
      <div id="menu"></div>
    </nav>
    <main>
      <div class="toolbar">
        <div>
          <div class="toolbar-title" id="activeTitle">-</div>
          <div class="source" id="activeSource"></div>
        </div>
        <div class="actions">
          <a class="btn" id="openNew" target="_blank" rel="noopener">새 창</a>
          <button class="btn" id="reloadFrame" type="button">새로고침</button>
        </div>
      </div>
      <iframe id="pageFrame" title="선택한 HTML"></iframe>
    </main>
  </div>
  <script>
    const PAGES = [
  {
    "id": "01-가계약서",
    "title": "가계약서",
    "category": "가계약",
    "source": "가계약서.html",
    "file": "pages/01-가계약서.html"
  },
  {
    "id": "02-동의서명",
    "title": "동의서명",
    "category": "동의",
    "source": "동의서명.html",
    "file": "pages/02-동의서명.html"
  },
  {
    "id": "03-아파트-주택",
    "title": "아파트 주택 특약",
    "category": "주택/매매",
    "source": "아파트 주택.html",
    "file": "pages/03-아파트-주택.html"
  },
  {
    "id": "04-아파트",
    "title": "보성아파트",
    "category": "주택/매매",
    "source": "아파트.html",
    "file": "pages/04-아파트.html"
  },
  {
    "id": "05-원룸",
    "title": "원룸 특약",
    "category": "임대차",
    "source": "원룸.html",
    "file": "pages/05-원룸.html"
  },
  {
    "id": "06-월세1",
    "title": "보성월세1",
    "category": "임대차",
    "source": "월세1.html",
    "file": "pages/06-월세1.html"
  },
  {
    "id": "07-토지",
    "title": "토지 매매 특약 선택기",
    "category": "토지",
    "source": "토지.html",
    "file": "pages/07-토지.html"
  },
  {
    "id": "08-기본",
    "title": "기본",
    "category": "주택/매매",
    "source": "■기본.html",
    "file": "pages/08-기본.html"
  },
  {
    "id": "09-상가특약",
    "title": "상가월세",
    "category": "상가",
    "source": "■상가특약.html",
    "file": "pages/09-상가특약.html"
  },
  {
    "id": "10-아파트1",
    "title": "아파트AI정리",
    "category": "주택/매매",
    "source": "■■아파트1.html",
    "file": "pages/10-아파트1.html"
  },
  {
    "id": "11-월세2",
    "title": "보성월세2",
    "category": "임대차",
    "source": "■■월세2.html",
    "file": "pages/11-월세2.html"
  }
];
    const state = {
      activeId: location.hash ? decodeURIComponent(location.hash.slice(1)) : PAGES[0]?.id,
      query: ""
    };

    const menu = document.getElementById("menu");
    const frame = document.getElementById("pageFrame");
    const activeTitle = document.getElementById("activeTitle");
    const activeSource = document.getElementById("activeSource");
    const openNew = document.getElementById("openNew");

    function activePage() {
      return PAGES.find(page => page.id === state.activeId) || PAGES[0];
    }

    function renderMenu() {
      const query = state.query.trim().toLowerCase();
      const filtered = PAGES.filter(page => {
        const text = `${page.title} ${page.source} ${page.category}`.toLowerCase();
        return !query || text.includes(query);
      });
      const groups = new Map();
      filtered.forEach(page => {
        if (!groups.has(page.category)) groups.set(page.category, []);
        groups.get(page.category).push(page);
      });
      menu.innerHTML = "";
      groups.forEach((pages, category) => {
        const heading = document.createElement("div");
        heading.className = "category";
        heading.textContent = category;
        menu.appendChild(heading);
        pages.forEach(page => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "page-btn" + (page.id === state.activeId ? " active" : "");
          button.innerHTML = `<div>${escapeHtml(page.title)}</div><div class="source">${escapeHtml(page.source)}</div>`;
          button.addEventListener("click", () => openPage(page.id));
          menu.appendChild(button);
        });
      });
      if (!filtered.length) {
        menu.innerHTML = '<div class="empty">검색 결과가 없습니다.</div>';
      }
    }

    function openPage(id) {
      state.activeId = id;
      const page = activePage();
      location.hash = encodeURIComponent(page.id);
      frame.src = page.file;
      activeTitle.textContent = page.title;
      activeSource.textContent = `원본: ${page.source}`;
      openNew.href = page.file;
      renderMenu();
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    document.getElementById("search").addEventListener("input", event => {
      state.query = event.target.value;
      renderMenu();
    });
    document.getElementById("reloadFrame").addEventListener("click", () => {
      frame.contentWindow?.location.reload();
    });
    window.addEventListener("hashchange", () => {
      const id = decodeURIComponent(location.hash.slice(1));
      if (id && id !== state.activeId) openPage(id);
    });

    renderMenu();
    if (activePage()) openPage(activePage().id);
  </script>
</body>
</html>
