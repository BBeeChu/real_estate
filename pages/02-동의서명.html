<div style="font-family:Arial; line-height:1.7; max-width:700px; font-size:17px; font-weight:500;">

  <!-- 동의 문장 -->
  <div style="text-align:center; font-size:18px; font-weight:700; margin-bottom:15px; user-select:text;">
    상기 특약사항을 충분히 확인하고 상호 동의하여 계약합니다.
  </div>

  <!-- 날짜 -->
  <div style="text-align:center; margin-bottom:25px;">
    <input type="text" placeholder="2026-05-27"
      style="padding:8px; font-size:16px; width:160px; font-weight:600; text-align:center;">
  </div>

  <!-- 서명 (한줄 + 밑줄 없음) -->
  <div style="display:flex; justify-content:space-between; gap:60px; margin-top:10px; font-weight:600;">

    <div style="flex:1; text-align:center;">
      매도인 &nbsp; ____________________
    </div>

    <div style="flex:1; text-align:center;">
      매수인 &nbsp; ____________________
    </div>

  </div>

</div>

<script>
(function () {
  const pageId = "02-동의서명";
  const pageTitle = "동의서명";
  const sharedKey = "realEstateSelectedClauses";

  function selectedOptionText() {
    const values = [];
    document.querySelectorAll("input[type=checkbox]:checked").forEach((input) => {
      const label = input.closest("label");
      values.push(input.value || (label ? label.innerText : ""));
    });
    document.querySelectorAll(".selected, .active").forEach((node) => {
      values.push(node.innerText || node.textContent || "");
    });
    return values
      .map(value => value.trim())
      .filter(Boolean)
      .filter((value, index, all) => all.indexOf(value) === index);
  }

  function publishSelection() {
    const selected = selectedOptionText();
    let stored = {};
    try {
      stored = JSON.parse(localStorage.getItem(sharedKey) || "{}");
    } catch (error) {
      stored = {};
    }
    if (selected.length) {
      stored[pageId] = { title: pageTitle, clauses: selected };
    } else {
      delete stored[pageId];
    }
    localStorage.setItem(sharedKey, JSON.stringify(stored));
    try {
      window.parent.postMessage({ type: "realEstateClausesUpdated", pageId, clauses: selected }, "*");
    } catch (error) {}
  }

  document.addEventListener("click", () => setTimeout(publishSelection, 0), true);
  document.addEventListener("change", () => setTimeout(publishSelection, 0), true);
  publishSelection();
}());
</script>
