임대차/근저당 없는 경우

</button>

임대차/가계약금 반환
</button>

<button class="option memoBtn"

</div>

<button class="copy-btn" onclick="copyText()">📋 복사</button>
<button class="copy-btn" onclick="printText()">🖨 인쇄</button>

<script>

let selectedType = "";
let selectedMemos = [];
let selectedPriceType = "sale";

const typeBtns = document.querySelectorAll(".typeBtn");
const memoBtns = document.querySelectorAll(".memoBtn");
const priceBtns = document.querySelectorAll(".priceBtn");

typeBtns.forEach(btn=>{

  btn.addEventListener("click",()=>{

    typeBtns.forEach(b=>b.classList.remove("active"));

    btn.classList.add("active");

    selectedType = btn.dataset.text;

    if(selectedType.includes("매매")){
      selectedPriceType="sale";
    }

    if(selectedType.includes("전세")){
      selectedPriceType="jeonse";
    }

    if(selectedType.includes("월세")){
      selectedPriceType="rent";
    }

    priceBtns.forEach(b=>b.classList.remove("active"));

    document.querySelector(`[data-type="${selectedPriceType}"]`)
      .classList.add("active");

    document.getElementById("saleBox").classList.add("hidden");
    document.getElementById("jeonseBox").classList.add("hidden");
    document.getElementById("rentBox").classList.add("hidden");

    if(selectedPriceType==="sale"){
      document.getElementById("saleBox").classList.remove("hidden");
    }

    if(selectedPriceType==="jeonse"){
      document.getElementById("jeonseBox").classList.remove("hidden");
    }

    if(selectedPriceType==="rent"){
      document.getElementById("rentBox").classList.remove("hidden");
    }

    generateText();

  });

});

memoBtns.forEach(btn=>{

  btn.addEventListener("click",()=>{

    btn.classList.toggle("active");

    const text = btn.dataset.text;

    if(selectedMemos.includes(text)){

      selectedMemos = selectedMemos.filter(t=>t!==text);

    }else{

      selectedMemos.push(text);

    }

    generateText();

  });

});

priceBtns.forEach(btn=>{

  btn.addEventListener("click",()=>{

    priceBtns.forEach(b=>b.classList.remove("active"));

    btn.classList.add("active");

    selectedPriceType = btn.dataset.type;

    document.getElementById("saleBox").classList.add("hidden");
    document.getElementById("jeonseBox").classList.add("hidden");
    document.getElementById("rentBox").classList.add("hidden");

    if(selectedPriceType==="sale"){
      document.getElementById("saleBox").classList.remove("hidden");
    }

    if(selectedPriceType==="jeonse"){
      document.getElementById("jeonseBox").classList.remove("hidden");
    }

    if(selectedPriceType==="rent"){
      document.getElementById("rentBox").classList.remove("hidden");
    }

    generateText();

  });

});

document.querySelectorAll("input").forEach(input=>{

  input.addEventListener("input",generateText);

});

function generateText(){

  const house = document.getElementById("house").value;
  const money = document.getElementById("money").value;

  const salePrice = document.getElementById("salePrice").value;
  const jeonsePrice = document.getElementById("jeonsePrice").value;
  const deposit = document.getElementById("deposit").value;
  const monthly = document.getElementById("monthly").value;

  const rawDate = document.getElementById("date").value;
  const rawMoveDate = document.getElementById("moveDate").value;

  let formattedDate = "";
  let formattedMoveDate = "";

  if(rawDate){

    const d = new Date(rawDate);

    formattedDate =
      d.getFullYear() + "년 " +
      (d.getMonth()+1) + "월 " +
      d.getDate() + "일";

  }

  if(rawMoveDate){

    const md = new Date(rawMoveDate);

    formattedMoveDate =
      md.getFullYear() + "년 " +
      (md.getMonth()+1) + "월 " +
      md.getDate() + "일";

  }

  const buyer = document.getElementById("buyer").value;
  const seller = document.getElementById("seller").value;

  const now = new Date();

  const writeDate =
    now.getFullYear() + "년 " +
    (now.getMonth()+1) + "월 " +
    now.getDate() + "일";

  let text = "";

  text += "📋 부동산 가계약서\n\n";

  text += "• 거래종류 : " + selectedType + "\n";
  text += "• 매물명/주소 : " + house + "\n";

  if(selectedPriceType==="sale"){
    text += "• 매매금액 : " + salePrice + "\n";
  }

  if(selectedPriceType==="jeonse"){
    text += "• 전세금액 : " + jeonsePrice + "\n";
  }

  if(selectedPriceType==="rent"){
    text += "• 임대차보증금 : " + deposit + "\n";
    text += "• 월세 : " + monthly + "\n";
  }

  text += "• 가계약금 : " + money + "\n";
  text += "• 계약서작성일 : " + formattedDate + "\n";
  text += "• 잔금/입주예정일 : " + formattedMoveDate + "\n";
  text += "• 매수인/임차인 : " + buyer + "\n";
  text += "• 매도인/임대인 : " + seller + "\n\n";

  text += "📝 특약사항\n";

  if(selectedMemos.length===0){

    text += "- 특약 선택 없음\n";

  }else{

    selectedMemos.forEach((memo,i)=>{

      text += (i+1) + ". " + memo + "\n";

    });

  }

  text += "\n";
  text += "보성공인중개사사무소:제형석\n\n";
  text += "• 작성일 : " + writeDate + "\n";

  document.getElementById("result").value = text;

}

function copyText(){

  const text = document.getElementById("result");

  text.select();

  text.setSelectionRange(0,99999);

  navigator.clipboard.writeText(text.value);

  alert("📋 가계약 문구가 복사되었습니다.");

}

function clearInput(id){

  document.getElementById(id).value = "";

  generateText();

}

function clearAll(){

  document.querySelectorAll("input").forEach(input=>{

    input.value="";

  });

  selectedMemos=[];

  memoBtns.forEach(btn=>{

    btn.classList.remove("active");

  });

  selectedType="";

  typeBtns.forEach(btn=>{

    btn.classList.remove("active");

  });

  generateText();

}

function printText(){

  const content = document.getElementById("result").value;

  const win = window.open("","","width=900,height=700");

  win.document.write(`

<script>
(function () {
  const sharedKey = "realEstateSelectedClauses";
  const pageId = "01-가계약서";

  function sharedClauses() {
    try {
      const stored = JSON.parse(localStorage.getItem(sharedKey) || "{}");
      return Object.entries(stored)
        .filter(([id]) => id !== pageId)
        .flatMap(([, entry]) => Array.isArray(entry.clauses) ? entry.clauses : [])
        .map(value => String(value).trim())
        .filter(Boolean)
        .filter((value, index, values) => values.indexOf(value) === index);
    } catch (error) {
      return [];
    }
  }

  function appendSharedClauses() {
    const result = document.getElementById("result");
    if (!result) return;
    const clauses = sharedClauses();
    let text = result.value || "";
    text = text.replace(/\n\[다른 섹션 선택 특약\][\s\S]*?(?=\n\n보성공인중개사사무소:|\n보성공인중개사사무소:|$)/, "");
    if (clauses.length) {
      text = text.replace("- 특약 선택 없음\n", "");
      const block = "\n[다른 섹션 선택 특약]\n" + clauses.map((clause, index) => `${index + 1}. ${clause}`).join("\n");
      text = text.replace(/\n\n보성공인중개사사무소:/, block + "\n\n보성공인중개사사무소:");
      if (text.indexOf(block) === -1) text += "\n" + block;
    }
    result.value = text;
  }

  function installGenerateHook() {
    if (typeof generateText === "function" && !generateText.__realEstateSharedHook) {
      const original = generateText;
      generateText = function () {
        original.apply(this, arguments);
        appendSharedClauses();
      };
      generateText.__realEstateSharedHook = true;
      generateText();
      return true;
    }
    appendSharedClauses();
    return false;
  }

  function downloadContract() {
    const result = document.getElementById("result");
    const text = result && result.value ? result.value.trim() : "";
    if (!text) {
      alert("다운로드할 가계약서 문구가 없습니다.");
      return;
    }
    const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "가계약서.txt";
    document.body.appendChild(link);
    link.click();
    URL.revokeObjectURL(link.href);
    link.remove();
  }

  function addDownloadButton() {
    if (document.getElementById("re-download-precontract")) return;
    const group = document.querySelector(".btn-group");
    if (!group) return;
    const button = document.createElement("button");
    button.id = "re-download-precontract";
    button.className = "copy-btn";
    button.type = "button";
    button.textContent = "💾 다운로드";
    button.addEventListener("click", downloadContract);
    group.insertBefore(button, group.children[2] || null);
  }

  window.addEventListener("storage", event => {
    if (event.key === sharedKey) appendSharedClauses();
  });
  window.addEventListener("message", event => {
    if (event.data && event.data.type === "realEstateClausesUpdated") appendSharedClauses();
  });

  addDownloadButton();
  installGenerateHook();
}());
</script>
