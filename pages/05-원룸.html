<!DOCTYPE html>

<meta charset="UTF-8">
<title>특약 선택 PRO 최종 완성</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#eef2f6;
}

/* 헤더 */
header{
  background:#1e2f4d;
  color:#fff;
  padding:14px;
  text-align:center;
  font-size:40px;
  font-weight:bold;
}

/* 레이아웃 */
.wrap{
  display:flex;
  gap:10px;
  padding:10px;
}

/* 박스 */
.box{
  flex:1;
  background:#fff;
  border-radius:10px;
  padding:10px;
  height:88vh;
  overflow:auto;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* 🔥 특약 스타일 */
.item{
  font-size:24px;
  padding:6px 8px;
  border-bottom:1px solid #eee;
  line-height:1.25;
}

/* 체크박스 */
input[type="checkbox"]{
  transform:scale(1.8);
  margin-right:10px;
}

/* 🔥 결과 영역 검정 배경 */
.result{
  background:#000;
  color:#fff;
  border:1px solid #333;
  padding:12px;
  min-height:480px;
  font-size:23px;
  line-height:1.25;
  border-radius:8px;
}

/* 🔥 결과 항목 간격 핵심 수정 */
.result-item{
  margin-bottom:10px;   /* 👉 항목 간격 */
  padding-bottom:10px;
  border-bottom:1px solid #333;
}

/* 버튼 */
button{
  width:100%;
  padding:14px;
  font-size:24px;
  border:none;
  border-radius:8px;
  margin-top:6px;
  cursor:pointer;
}

.copy{
  background:#2d89ef;
  color:#fff;
}

.clear{
  background:#ff5b5b;
  color:#fff;
}

h3{
  font-size:28px;
  margin:6px 0;
}
</style>
</head>

"첨부서류 : 중개대상물확인·설명서, 공제증서 사본 각 1부.",
"영남에너지 (054-285-0852),한전(054-123)에 연락하여 명의등록 후 사용하여야 합니다.",
"임대인의 계좌번호는 0000000                입니다.",

const list = document.getElementById("list");
const out = document.getElementById("out");

/* 생성 */
data.forEach((t,i)=>{
  const div = document.createElement("div");
  div.className="item";

  div.innerHTML=`
    <input type="checkbox" class="chk" data-i="${i}">
    ${i+1}. ${t}
  `;

  list.appendChild(div);
});

/* 출력 (🔥 div 구조로 변경) */
document.addEventListener("change", ()=>{

  let html="";

  document.querySelectorAll(".chk:checked").forEach((c,i)=>{
    html += `<div class="result-item">${i+1}. ${data[c.dataset.i]}</div>`;
  });

  out.innerHTML = html;
});

/* 복사 */
function copyText(){

  const text = document.getElementById("out").innerText;

  if(!text || text.trim()===""){
    alert("복사할 특약이 없습니다.");
    return;
  }

  navigator.clipboard.writeText(text);
  alert("특약 복사 완료");
}

/* 초기화 */
function resetAll(){
  document.querySelectorAll(".chk").forEach(c=>c.checked=false);
  out.innerHTML="";
}

</script>

<div id="re-custom-panel">
  <details>
    <summary>내 문구 추가</summary>
    <div class="body">
      <textarea id="re-custom-input" placeholder="이 HTML에만 저장할 문구를 입력하세요."></textarea>
      <div class="actions">
        <button class="primary" id="re-custom-add" type="button">추가</button>
        <button id="re-custom-copy" type="button">내 문구 복사</button>
        <button id="re-custom-clear" type="button">전체 삭제</button>
      </div>
      <div class="list" id="re-custom-list"></div>
    </div>
  </details>
</div>
<script>
(function () {
  const pageId = "05-원룸";
  const key = "realEstateCustomClauses:" + pageId;
  const input = document.getElementById("re-custom-input");
  const list = document.getElementById("re-custom-list");
  const add = document.getElementById("re-custom-add");
  const copy = document.getElementById("re-custom-copy");
  const clear = document.getElementById("re-custom-clear");

  function read() {
    try {
      const value = JSON.parse(localStorage.getItem(key) || "[]");
      return Array.isArray(value) ? value : [];
    } catch (error) {
      return [];
    }
  }

  function write(values) {
    localStorage.setItem(key, JSON.stringify(values));
  }

  function render() {
    const values = read();
    list.innerHTML = "";
    if (!values.length) {
      list.innerHTML = '<div style="color:#6b7280;font-size:13px;">아직 추가한 문구가 없습니다.</div>';
      return;
    }
    values.forEach((value, index) => {
      const row = document.createElement("div");
      row.className = "item";
      row.innerHTML = '<div class="item-row"><div>' + (index + 1) + '. ' + escapeHtml(value) + '</div><button class="delete" type="button">삭제</button></div>';
      row.querySelector("button").addEventListener("click", () => {
        const next = read().filter((_, itemIndex) => itemIndex !== index);
        write(next);
        render();
      });
      list.appendChild(row);
    });
  }

  function escapeHtml(value) {
    return String(value).replace(/[&<>"']/g, char => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[char]));
  }

  add.addEventListener("click", () => {
    const value = input.value.trim();
    if (!value) {
      alert("추가할 문구를 입력하세요.");
      return;
    }
    const values = read();
    values.push(value);
    write(values);
    input.value = "";
    render();
  });

  copy.addEventListener("click", async () => {
    const text = read().map((value, index) => `${index + 1}. ${value}`).join("\n");
    if (!text) {
      alert("복사할 문구가 없습니다.");
      return;
    }
    try {
      await navigator.clipboard.writeText(text);
    } catch (error) {
      const temp = document.createElement("textarea");
      temp.value = text;
      document.body.appendChild(temp);
      temp.select();
      document.execCommand("copy");
      temp.remove();
    }
    alert("내 문구 복사 완료");
  });

  clear.addEventListener("click", () => {
    if (!confirm("이 HTML에 추가한 문구를 모두 삭제할까요?")) return;
    write([]);
    render();
  });

  render();
}());
</script>
