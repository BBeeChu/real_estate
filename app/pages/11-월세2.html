<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Malgun Gothic',sans-serif;
    background:#111;
    color:#fff;
    height:100vh;
    overflow:hidden;
}

/* 헤더 */
header{
    background:#000;
    padding:14px;
    text-align:center;
    font-size:40px;
    font-weight:bold;
    border-bottom:1px solid #333;
}

/* 전체 */
.wrap{
    display:flex;
    height:calc(100vh - 60px);
}

/* 왼쪽 */
.left{
    width:50%;
    overflow-y:auto;
    padding:10px;
    border-right:1px solid #333;
    background:#181818;
}

/* 오른쪽 */
.right{
    width:50%;
    padding:10px;
    background:#101010;
    display:flex;
    flex-direction:column;
}

/* 특약 버튼 */
.item{
    background:#222;
    margin-bottom:4px;
    padding:6px 8px;
    border-radius:6px;
    cursor:pointer;
    transition:0.2s;
    font-size:23px;
    line-height:1.2;
    border:1px solid #333;
}

.item:hover{
    background:#333;
}

.item.active{
    background:#00a86b;
    color:#fff;
    border-color:#00d084;
}

/* 결과창 */
#result{
    flex:1;
    overflow-y:auto;
    background:#000;
    border:1px solid #333;
    border-radius:8px;
    padding:6px;
    font-size:23px;
    line-height:1.15;
}

/* 결과 항목 간격 완전 축소 */
.result-item{
    display:flex;
    align-items:flex-start;
    gap:6px;
    margin:0 !important;
    padding:1px 0 !important;
    line-height:1.15 !important;
    border-bottom:1px solid #1d1d1d;
}

/* 순번 */
.num{
    min-width:34px;
    color:#00d084;
    font-weight:bold;
}

/* 문장 */
.txt{
    flex:1;
}

/* 복사 버튼 */
.copy-btn{
    margin-top:8px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#00a86b;
    color:#fff;
    font-size:23px;
    cursor:pointer;
    font-weight:bold;
}

.copy-btn:hover{
    background:#00c27b;
}
</style>

const list = document.getElementById("list");
const result = document.getElementById("result");

let selected = [];

items.forEach(text=>{

    const div=document.createElement("div");
    div.className="item";
    div.innerText=text;

    div.onclick=()=>{

        if(div.classList.contains("active")){

            div.classList.remove("active");
            selected=selected.filter(v=>v!==text);

        }else{

            div.classList.add("active");
            selected.push(text);

        }

        renderResult();
    };

    list.appendChild(div);

});

function renderResult(){

    result.innerHTML="";

    selected.forEach((text,index)=>{

        result.innerHTML += `
            <div class="result-item">

                <div class="num">
                    ${index + 1}.
                </div>

                <div class="txt">
                    ${text}
                </div>

            </div>
        `;

    });

}

function copyText(){

    let text = selected.map((v,i)=>`${i+1}. ${v}`).join("\n");

    navigator.clipboard.writeText(text);

    alert("복사 완료");

}

<script>
(function () {
  const pageId = "11-월세2";
  const key = "realEstateCustomClauses:" + pageId;
  const input = document.getElementById("re-custom-input");
  const list = document.getElementById("re-custom-list");
  const add = document.getElementById("re-custom-add");
  const copy = document.getElementById("re-custom-copy");
  const clear = document.getElementById("re-custom-clear");

  function read() {
    try {
      const value = JSON.parse(localStorage.getItem(key) || "[]");
      return Array.isArray(value) ? value : [];
    } catch (error) {
      return [];
    }
  }

  function write(values) {
    localStorage.setItem(key, JSON.stringify(values));
  }

  function render() {
    const values = read();
    list.innerHTML = "";
    if (!values.length) {
      list.innerHTML = '<div style="color:#6b7280;font-size:13px;">아직 추가한 문구가 없습니다.</div>';
      return;
    }
    values.forEach((value, index) => {
      const row = document.createElement("div");
      row.className = "item";
      row.innerHTML = '<div class="item-row"><div>' + (index + 1) + '. ' + escapeHtml(value) + '</div><button class="delete" type="button">삭제</button></div>';
      row.querySelector("button").addEventListener("click", () => {
        const next = read().filter((_, itemIndex) => itemIndex !== index);
        write(next);
        render();
      });
      list.appendChild(row);
    });
  }

  function escapeHtml(value) {
    return String(value).replace(/[&<>"']/g, char => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[char]));
  }

  add.addEventListener("click", () => {
    const value = input.value.trim();
    if (!value) {
      alert("추가할 문구를 입력하세요.");
      return;
    }
    const values = read();
    values.push(value);
    write(values);
    input.value = "";
    render();
  });

  copy.addEventListener("click", async () => {
    const text = read().map((value, index) => `${index + 1}. ${value}`).join("\n");
    if (!text) {
      alert("복사할 문구가 없습니다.");
      return;
    }
    try {
      await navigator.clipboard.writeText(text);
    } catch (error) {
      const temp = document.createElement("textarea");
      temp.value = text;
      document.body.appendChild(temp);
      temp.select();
      document.execCommand("copy");
      temp.remove();
    }
    alert("내 문구 복사 완료");
  });

  clear.addEventListener("click", () => {
    if (!confirm("이 HTML에 추가한 문구를 모두 삭제할까요?")) return;
    write([]);
    render();
  });

  render();
}());
</script>
