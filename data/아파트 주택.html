<title>보성부동산 특약 선택기</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    display:flex;
    height:100vh;
    overflow:hidden;
}

/* 왼쪽 */
.left{
    width:45%;
    padding:20px;
    overflow-y:auto;
    border-right:2px solid #ddd;
    background:#fff;
}

/* 제목 */
.mainTitle{
    font-size:38px;
    font-weight:bold;
    margin-bottom:20px;
    position:sticky;
    top:0;
    background:#fff;
    padding-bottom:10px;
    z-index:10;
}

/* 소제목 */
.sectionTitle{
    font-size:26px;
    margin-bottom:15px;
    font-weight:bold;
}

/* 선택 항목 */
.option{
    display:block;
    font-size:20px;
    line-height:1.6;
    margin:10px 0;
    padding:12px;
    border-radius:10px;
    cursor:pointer;
    transition:0.2s;
    border:1px solid #ddd;
}

.option input{
    transform:scale(1.3);
    margin-right:10px;
}

/* 선택 시 강조 */
.option.checked{
    background:#e6f0ff;
    color:#0057ff;
    font-weight:bold;
    border:1px solid #0057ff;
}

/* 오른쪽 */
.right{
    width:55%;
    background:#000;
    color:#fff;
    padding:20px;
    position:relative;
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

/* 생성 결과 제목 상단 고정 */
.resultTitle{
    font-size:34px;
    font-weight:bold;
    margin-bottom:15px;
    position:sticky;
    top:0;
    background:#000;
    padding-bottom:10px;
    z-index:10;
}

/* 결과창 스크롤 */
.resultWrap{
    flex:1;
    overflow-y:auto;
    padding-right:10px;
    margin-bottom:70px;
}

/* 결과창 */
#result{
    white-space:pre-wrap;
    font-size:23px;
    line-height:1.25;
    word-break:keep-all;
}

/* 복사 버튼 */
.copyBtn{
    position:absolute;
    bottom:20px;
    right:20px;
    padding:14px 22px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    font-weight:bold;
}

/* 스크롤바 */
::-webkit-scrollbar{
    width:10px;
}

::-webkit-scrollbar-thumb{
    background:#888;
    border-radius:10px;
}

::-webkit-scrollbar-track{
    background:#eee;
}
</style>
</head>

<input type="checkbox" onchange="generate()" value="본 계약 체결 이후 일방의 귀책사유로 인하여 계약이 해제될 경우, 위약금은 계약금을 기준으로 한다. 즉, 매수인의 귀책사유로 계약이 해제되는 경우에는, 매수인은 지급한 계약금을 포기해야 하고, 매도인의 귀책사유로 계약이 해제되는 경우에는, 매수인으로부터 수령한 계약금의 배액을, 매수인에게 즉시 지급하기로 한다.">
(단독주택) 위약금 계약
</label>

<label class="option">
<input type="checkbox" onchange="generate()" value="매수인은 대출 미승인 사유만으로 계약 해제를 요구할 수 없다.">

</label>

<label class="option">
<input type="checkbox" onchange="generate()" value="매도인은 잔금일까지 전입세대 및 임차권 관계가 없도록 유지해야 한다.">
(단독주택) 전입세대 정리
</label>

<input type="checkbox" onchange="generate()" value="현 임차인의 보증금 반환은 매도인이 책임진다.">
(단독주택) 임차인 보증금 매도자책임
</label>

<label class="option">
<input type="checkbox" onchange="generate()" value="본 계약은 임차인의 전세보증금을 승계하는 조건으로 체결하며, 임대차 계약 내용은 매수인이 확인 후 승계하기로 한다.">

<div class="right">

<div class="resultTitle">생성 결과</div>

<div class="resultWrap">
<div id="result">선택된 특약이 여기에 표시됩니다</div>
</div>

<button class="copyBtn" onclick="copyText()">복사</button>

</div>

<script>

function generate(){

    let options = document.querySelectorAll(".option");
    let result = "";
    let count = 1;

    options.forEach((opt)=>{

        let cb = opt.querySelector("input");

        if(cb.checked){

            opt.classList.add("checked");

            result += count + ". " + cb.value + "\n\n";

            count++;

        }else{

            opt.classList.remove("checked");

        }

    });

    document.getElementById("result").innerText =
    result || "선택된 특약이 여기에 표시됩니다";

}

function copyText(){

    navigator.clipboard.writeText(
        document.getElementById("result").innerText
    );

    alert("복사되었습니다");

}

</script>
