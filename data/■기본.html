```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>기본</title>

<style>
*{
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
}

body{
    margin:0;
    font-family:'Malgun Gothic',sans-serif;
    background:#111;
    color:#fff;
    overflow:hidden;
}

/* 헤더 */
header{
    background:#000;
    padding:14px;
    text-align:center;
    font-size:40px;
    font-weight:bold;
    border-bottom:1px solid #333;
}

/* 전체 */
.wrap{
    display:flex;
    height:calc(100vh - 76px);
}

/* 왼쪽 */
.left{
    width:50%;
    overflow-y:auto;
    padding:10px;
    border-right:1px solid #333;
    background:#181818;
}

/* 오른쪽 */
.right{
    width:50%;
    padding:10px;
    background:#101010;
    display:flex;
    flex-direction:column;
}

/* 특약 버튼 */
.item{
    background:#222;
    margin-bottom:4px;
    padding:6px 8px;
    border-radius:6px;
    cursor:pointer;
    transition:0.2s;
    font-size:23px;
    line-height:1.2;
    border:1px solid #333;
    user-select:none;
    word-break:keep-all;
}

.item:hover{
    background:#333;
}

.item.active{
    background:#00a86b;
    color:#fff;
    border-color:#00d084;
}

/* 결과창 */
#result{
    flex:1;
    overflow-y:auto;
    background:#000;
    border:1px solid #333;
    border-radius:8px;
    padding:6px;
    font-size:23px;
    line-height:1.15;
    word-break:keep-all;
}

/* 결과 항목 간격 완전 축소 */
.result-item{
    display:flex;
    align-items:flex-start;
    gap:6px;
    margin:0 !important;
    padding:1px 0 !important;
    line-height:1.15 !important;
    border-bottom:1px solid #1d1d1d;
}

/* 순번 */
.num{
    min-width:34px;
    color:#00d084;
    font-weight:bold;
}

/* 문장 */
.txt{
    flex:1;
}

/* 복사 버튼 */
.copy-btn{
    margin-top:8px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#00a86b;
    color:#fff;
    font-size:23px;
    cursor:pointer;
    font-weight:bold;
}

.copy-btn:hover{
    background:#00c27b;
}

/* 모바일 */
@media(max-width:900px){

    header{
        font-size:28px;
        padding:12px;
    }

    .wrap{
        flex-direction:column;
        height:calc(100vh - 86px);
    }

    .left,
    .right{
        width:100%;
        height:50%;
    }

    .item,
    #result,
    .copy-btn{
        font-size:18px;
    }

}
</style>
</head>

<body>

<header>
기본
</header>

<div class="wrap">

    <!-- 왼쪽 -->
    <div class="left" id="list"></div>

    <!-- 오른쪽 -->
    <div class="right">

        <div id="result"></div>

        <button class="copy-btn" onclick="copyText()">
            특약 복사
        </button>

    </div>

</div>

<script>

const items = [

"매수인은 계약 전 목적물의 현 상태를 직접 확인하고 현 시설 상태 그대로 계약한다.",

"매매 대금 중 현 임대보증금은 잔금에서 공제하며, 현 임대차계약은 매수인이 승계한다.",

"공부상 면적과 실제 사용면적 차이에 대하여 매수인은 이의를 제기하지 않는다.",

"건물 노후로 인한 균열·결로·누수 등에 대하여 매도인은 책임지지 않는다.",

"발코니 천장 및 외벽 누수는 건물 노후에 따른 현상으로 매수인은 이를 확인 후 계약한다.",

"계약 당시 고지되지 않은 중대한 하자가 발견될 경우 매도인은 이를 수리하거나 손해를 배상한다.",

"향후 불법확장에 따른 원상복구 및 이행강제금은 매수인이 부담한다.",

"보일러는 입주 후 가스 개통 즉시 확인하며 이상 발견 시 즉시 통보하고 매도인은 수리를 원칙으로 한다.",

"잔금일 기준 시설물은 정상 작동 상태로 인도한다.",

"벽걸이 에어컨 및 스탠드 에어컨은 매매대금에 포함된다.",

"붙박이장, 중문, 가전 및 기타 현존 옵션은 매매대금에 포함된다.",

"매도인은 잔금 전 TV, 냉장고, 세탁기를 철거한다.",

"관리비는 잔금일 기준으로 일할 정산한다.",

"관리비 및 제세공과금 체납은 매도인이 책임진다.",

"매도인은 잔금과 동시에 근저당 등 권리 제한 사항을 말소한다.",

"매도인은 소유권 이전에 필요한 서류를 잔금과 동시에 교부한다.",

"목적물은 잔금일까지 공실 상태로 인도한다.",

"기존 임대차 계약은 동일 조건으로 매수인에게 승계된다.",

"임차인 보증금은 잔금에서 공제하고 매수인이 승계한다.",

"대출 지연 등 불가피한 사유 발생 시 상호 협의하여 잔금일을 조정할 수 있다.",

"매수인의 귀책사유로 계약 해제 시 계약금은 매도인에게 귀속된다.",

"매도인의 귀책사유로 계약 해제 시 계약금의 배액을 배상한다.",

"매도인의 명도 지연 시 지연손해금을 지급한다.",

"매수인의 대출 불가 시 계약금 반환 여부는 상호 협의한다.",

"매수인은 중개대상물 확인설명서를 교부받고 확인하였다.",

"본 특약사항은 계약서 본문보다 우선하여 적용한다.",

"양 당사자는 매도목적물의 권리관계 및 현 시설상태를 직접 확인 후 계약하며, 추후 당사자 간 발생하는 분쟁에 대하여 공인중개사에게 민·형사상 책임을 묻지 아니한다. 단, 공인중개사의 고의 또는 중대한 과실이 있는 경우는 제외한다.",

"첨부서류 : 중개대상물확인·설명서, 공제증서 사본 각 1부.",

"도시가스 개통은 영남에너지 (054-285-0852).",

"매도인 은행 계좌번호:000000000.",

];

const list = document.getElementById("list");
const result = document.getElementById("result");

let selected = [];

items.forEach(text=>{

    const div=document.createElement("div");

    div.className="item";
    div.innerText=text;

    div.onclick=()=>{

        if(div.classList.contains("active")){

            div.classList.remove("active");

            selected=selected.filter(v=>v!==text);

        }else{

            div.classList.add("active");

            selected.push(text);

        }

        renderResult();

    };

    list.appendChild(div);

});

function renderResult(){

    result.innerHTML="";

    selected.forEach((text,index)=>{

        result.innerHTML += `
            <div class="result-item">

                <div class="num">
                    ${index + 1}.
                </div>

                <div class="txt">
                    ${text}
                </div>

            </div>
        `;

    });

}

function copyText(){

    if(selected.length===0){

        alert("선택된 특약이 없습니다.");
        return;

    }

    let text = selected.map((v,i)=>`${i+1}. ${v}`).join("\n");

    navigator.clipboard.writeText(text)
    .then(()=>{
        alert("복사 완료");
    })
    .catch(()=>{
        alert("복사 실패");
    });

}

</script>

</body>
</html>
```
